<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM 2026 – Tagesspiegel Dashboard</title>
    <style>
        /* === FARBEN & GRUNDLAYOUT (TAGESSPIEGEL-STIL) === */
        :root {
            --ts-navy: #0f172a;
            --ts-blue: #1e3a8a;
            --ts-red: #b91c1c;
            --ts-bg: #f8fafc;
            --ts-border: #cbd5e1;
            --ts-text: #334155;
            --ts-highlight: #f0fdf4;
            --ts-highlight-text: #166534;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }

        body {
            background-color: var(--ts-bg);
            color: var(--ts-text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* === HEADER === */
        header {
            background-color: var(--ts-navy);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--ts-blue);
        }

        .header-left h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
        .header-left span { font-size: 13px; color: #94a3b8; font-weight: bold; letter-spacing: 1px; }

        .header-right { display: flex; align-items: center; gap: 15px; }
        
        #sync-status {
            font-size: 11px; font-weight: bold; padding: 5px 12px; border-radius: 4px;
            background: rgba(255,255,255,0.1); color: #fff;
        }
        
        #clock {
            font-size: 22px; font-weight: bold; font-family: monospace;
            background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 4px;
        }

        /* === FORTSCHRITTSBALKEN === */
        #progress-container { width: 100%; height: 6px; background: #e2e8f0; }
        #progress-bar { height: 100%; width: 0%; background: var(--ts-red); transition: width linear; }

        /* === MAIN INHALT & SLIDES === */
        main { flex: 1; position: relative; padding: 20px; }

        .slide {
            position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            opacity: 0; visibility: hidden; transition: opacity 0.5s ease-in-out;
            display: grid; gap: 20px;
        }
        .slide.active { opacity: 1; visibility: visible; }

        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-split { grid-template-columns: 1fr 1fr; }

        /* === BOXEN & TABELLEN === */
        .ts-box {
            background: #fff; border: 1px solid var(--ts-border);
            border-top: 4px solid var(--ts-navy); border-radius: 4px;
            padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }

        .ts-box h2 {
            font-size: 16px; color: var(--ts-navy); margin-bottom: 12px;
            padding-bottom: 6px; border-bottom: 2px solid var(--ts-border);
            text-transform: uppercase;
        }

        .ts-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .ts-table th { background: #f1f5f9; text-align: left; padding: 8px; border: 1px solid var(--ts-border); color: var(--ts-navy); }
        .ts-table td { padding: 8px; border: 1px solid var(--ts-border); }
        .ts-table tr:nth-child(1) td, .ts-table tr:nth-child(2) td {
            background-color: var(--ts-highlight); color: var(--ts-highlight-text); font-weight: bold;
        }

        /* === SPIELPLAN-LISTEN === */
        .match-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border: 1px solid var(--ts-border); border-left: 4px solid var(--ts-blue);
            margin-bottom: 8px; background: #f8fafc; border-radius: 3px;
        }
        .match-meta { font-size: 11px; color: #64748b; margin-bottom: 3px; }
        .match-teams { font-size: 14px; font-weight: bold; color: var(--ts-navy); }
        .match-score {
            font-family: monospace; font-size: 16px; font-weight: bold;
            background: #e2e8f0; padding: 4px 10px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1>FUSSBALL-WM 2026 — LIVE DASHBOARD</h1>
            <span>Stabile Datenanbindung • Tagesspiegel Layout</span>
        </div>
        <div class="header-right">
            <div id="sync-status">INITIALISIERE...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <main id="dashboard-container">
        </main>

    <script>
        // ==========================================
        // 1. ISOLIERTE UHR (Läuft immer)
        // ==========================================
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('de-DE');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==========================================
        // 2. DATENBANK & FALLBACK-SYSTEM

            },

        // ==========================================
        // 3. UI GENERATOR (Baut HTML fehlerfrei auf)
        // ==========================================

            const container = document.getElementById('dashboard-container');
            container.innerHTML = ''; // Vorherigen Inhalt löschen

            // SLIDE 1: SPIELÜBERSICHT
            let slide1 = `<div class="slide active grid-split" id="slide-0">`;
            
            // Gespielte Spiele
            slide1 += `<div class="ts-box"><h2>Zuletzt gespielte Begegnungen</h2><div>`;
            datenbank.spieleGespielt.forEach(s => {
                slide1 += `
                <div class="match-row" style="border-left-color: #64748b;">
                    <div><div class="match-meta">${s.meta}</div><div class="match-teams">${s.match}</div></div>
                    <div class="match-score">${s.res}</div>
                </div>`;
            });
            slide1 += `</div></div>`;

            slide1 += `<div class="ts-box"><h2>Anstehende Spiele (Vorschau)</h2><div>`;
