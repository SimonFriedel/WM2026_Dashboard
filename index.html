<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM 2026 – Live Kiosk Gruppenphase</title>
    <style>
        /* === MODERNES KIOSK-DESIGN (HOHER KONTRAST) === */
        :root {
            --bg-main: #090d16;
            --bg-card: #111b2d;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-green-bg: rgba(16, 185, 129, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* === HEADER === */
        header {
            background-color: #0c1322;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--border-color);
        }

        .title-area h1 { font-size: 24px; font-weight: 900; letter-spacing: 0.5px; color: var(--text-main); }
        .title-area span { font-size: 12px; color: var(--accent-cyan); font-weight: bold; text-transform: uppercase; }

        .meta-area { display: flex; align-items: center; gap: 20px; }
        #sync-badge { font-size: 11px; font-weight: bold; padding: 5px 10px; border-radius: 4px; background: #1e293b; }
        #clock { font-size: 22px; font-weight: bold; font-family: monospace; color: var(--accent-cyan); }

        /* === PROGRESS BAR === */
        #progress-container { width: 100%; height: 4px; background: #0f172a; }
        #progress-bar { height: 100%; width: 0%; background: var(--accent-cyan); transition: width linear; }

        /* === SLIDE CONTAINER === */
        main { flex: 1; position: relative; padding: 15px; }

        .slide {
            position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            opacity: 0; visibility: hidden; transition: opacity 0.6s ease-in-out;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Spalten */
            grid-template-rows: repeat(2, 1fr);    /* 2 Reihen = Max 8 Gruppen */
            gap: 15px;
        }
        .slide.active { opacity: 1; visibility: visible; }

        /* === GRUPPEN KARTEN === */
        .group-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .group-card h2 {
            font-size: 14px; text-transform: uppercase; color: var(--accent-cyan);
            border-bottom: 2px solid var(--border-color); padding-bottom: 4px; margin-bottom: 6px;
            font-weight: 800;
        }

        /* === TABELLEN === */
        .team-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 8px; }
        .team-table th { text-align: left; color: var(--text-muted); padding: 3px; font-weight: 600; border-bottom: 1px solid var(--border-color); }
        .team-table td { padding: 4px 3px; border-bottom: 1px solid #1e293b; }
        .team-table tr:nth-child(1) td, .team-table tr:nth-child(2) td { 
            background: var(--accent-green-bg); color: #34d399; font-weight: bold; 
        }

        /* === SPIELPLAN-REIHEN === */
        .matches-container { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; justify-content: flex-end; }
        .match-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 3px 5px; background: #0f172a; border-radius: 3px; font-size: 10px;
            border-left: 3px solid var(--border-color);
        }
        .match-row.live { border-left-color: var(--accent-cyan); background: rgba(6, 182, 212, 0.05); }
        .match-info { color: var(--text-muted); font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .match-teams { font-weight: 600; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 150px; }
        .match-score { font-family: monospace; font-weight: bold; color: var(--accent-cyan); padding-left: 5px; white-space: nowrap; }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>FIFA WORLD CUP 2026</h1>
            <span>Gruppenphase • Live-Kiosk-Modus</span>
        </div>
        <div class="meta-area">
            <div id="sync-badge">LADE DATEN...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <main id="slides-viewport">
        </main>

    <script>
        // 1. UHRZEIT
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
        }, 1000);

        // 2. SLIDER CONFIG
        let currentSlide = 0;
        let rotationTimer;
        const slideDuration = 15000; // 15 Sekunden Standzeit pro Seite

        function startSlider() {
            clearInterval(rotationTimer);
            const slides = document.querySelectorAll('.slide');
            const bar = document.getElementById('progress-bar');
            if(slides.length <= 1) return;

            function animateBar() {
                bar.style.transition = 'none'; bar.style.width = '0%';
                setTimeout(() => {
                    bar.style.transition = `width ${slideDuration}ms linear`;
                    bar.style.width = '100%';
                }, 50);
            }

            function switchSlide() {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
                animateBar();
            }

            animateBar();
            rotationTimer = setInterval(switchSlide, slideDuration);
        }

        // 3. DATENVERARBEITUNG & TABELLENBERECHNUNG
        async function updateData() {
            const badge = document.getElementById('sync-badge');
            badge.innerText = "SYNC...";
            badge.style.color = var(--accent-cyan);

            try {
                // Direktabruf von OpenLigaDB (CORS-kompatibel)
                const res = await fetch('https://api.openligadb.de/getmatchdata/wm2026');
                if(!res.ok) throw new Error("API Fehler");
                const matches = await res.json();

                if(!matches || matches.length === 0) {
                    badge.innerText = "KEINE WM-DATEN GEFUNDEN";
                    return;
                }

                // Datenstrukturen vorbereiten
                let groupMap = {};

                matches.forEach(m => {
                    let gName = m.group?.groupName;
                    // Nur Gruppen berücksichtigen (K.O. Spiele ignorieren)
                    if (!gName || !gName.toLowerCase().includes("gruppe")) return;

                    if (!groupMap[gName]) {
                        groupMap[gName] = { teams: {}, matches: [] };
                    }

                    // Spiel speichern
                    groupMap[gName].matches.push(m);

                    // Teams registrieren
                    let t1 = m.team1.teamName;
                    let t2 = m.team2.teamName;
                    if (!groupMap[gName].teams[t1]) groupMap[gName].teams[t1] = { name: t1, sp: 0, gf: 0, ga: 0, pkt: 0 };
                    if (!groupMap[gName].teams[t2]) groupMap[gName].teams[t2] = { name: t2, sp: 0, gf: 0, ga: 0, pkt: 0 };

                    // Mathematische Live-Tabellenberechnung anhand der Spielergebnisse
                    if (m.matchIsFinished && m.matchResults && m.matchResults.length > 0) {
                        // Nutze Endergebnis (resultTypeID === 2)
                        let endResult = m.matchResults.find(r => r.resultTypeID === 2) || m.matchResults[0];
                        let s1 = endResult.pointsTeam1;
                        let s2 = endResult.pointsTeam2;

                        groupMap[gName].teams[t1].sp++;
                        groupMap[gName].teams[t2].sp++;
                        groupMap[gName].teams[t1].gf += s1; groupMap[gName].teams[t1].ga += s2;
                        groupMap[gName].teams[t2].gf += s2; groupMap[gName].teams[t2].ga += s1;

                        if (s1 > s2) { groupMap[gName].teams[t1].pkt += 3; }
                        else if (s2 > s1) { groupMap[gName].teams[t2].pkt += 3; }
                        else { groupMap[gName].teams[t1].pkt += 1; groupMap[gName].teams[t2].pkt += 1; }
                    }
                });

                renderDashboard(groupMap);
                badge.innerText = "LIVE AKTUALISIERT";
                badge.style.color = "var(--accent-green)";

            } catch (err) {
                console.error(err);
                badge.innerText = "SYNC FEHLER (ERNEUT IN 10 MIN)";
                badge.style.color = "#ef4444";
            }
        }

        // 4. GENERIERUNG DES CODES (8 Gruppen pro Seite)
        function renderDashboard(groupMap) {
            const viewport = document.getElementById('slides-viewport');
            viewport.innerHTML = "";

            // Gruppen alphabetisch sortieren (Gruppe A, B, C...)
            const sortedGroupNames = Object.keys(groupMap).sort();

            // Aufteilen in Seiten à maximal 8 Gruppen
            let pages = [];
            for (let i = 0; i < sortedGroupNames.length; i += 8) {
                pages.push(sortedGroupNames.slice(i, i + 8));
            }

            pages.forEach((pageGroups, pageIdx) => {
                const slide = document.createElement('div');
                slide.className = `slide ${pageIdx === 0 ? 'active' : ''}`;
                slide.id = `slide-${pageIdx}`;

                pageGroups.forEach(gName => {
                    const card = document.createElement('div');
                    card.className = "group-card";

                    // Titel
                    let h2 = document.createElement('h2');
                    h2.innerText = gName;
                    card.appendChild(h2);

                    // Tabelle berechnen und sortieren
                    let tableBody = "";
                    let sortedTeams = Object.values(groupMap[gName].teams).sort((a,b) => {
                        return b.pkt - a.pkt || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf || a.name.localeCompare(b.name);
                    });

                    sortedTeams.forEach((t, index) => {
                        tableBody += `<tr>
                            <td>${index + 1}. ${t.name}</td>
                            <td style="text-align:center">${t.sp}</td>
                            <td style="text-align:center">${t.gf}:${t.ga}</td>
                            <td style="text-align:center; font-weight:bold">${t.pkt}</td>
                        </tr>`;
                    });

                    let tableHTML = `<table class="team-table">
                        <thead><tr><th>Team</th><th style="text-align:center">Sp</th><th style="text-align:center">Tore</th><th style="text-align:center">Pkt</th></tr></thead>
                        <tbody>${tableBody}</tbody>
                    </table>`;
                    card.insertAdjacentHTML('beforeend', tableHTML);

                    // Spiele auflisten
                    let matchesHTML = `<div class="matches-container">`;
                    // Sortiere Spiele chronologisch nach Datum
                    let sortedMatches = groupMap[gName].matches.sort((a,b) => new Date(a.matchDateTime) - new Date(b.matchDateTime));
                    
                    sortedMatches.forEach(m => {
                        let date = new Date(m.matchDateTime);
                        let dateStr = date.toLocaleDateString('de-DE', {day: '2-digit', month: '2-digit'}) + " " + date.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                        
                        let score = "- : -";
                        if(m.matchIsFinished && m.matchResults.length > 0){
                            let endRes = m.matchResults.find(r => r.resultTypeID === 2) || m.matchResults[0];
                            score = `${endRes.pointsTeam1} : ${endRes.pointsTeam2}`;
                        }

                        matchesHTML += `
                            <div class="match-row ${!m.matchIsFinished && new Date() >= date ? 'live' : ''}">
                                <div>
                                    <div class="match-info">${dateStr} • ${m.location?.locationCity || 'WM-Stadion'}</div>
                                    <div class="match-teams">${m.team1.shortName || m.team1.teamName} - ${m.team2.shortName || m.team2.teamName}</div>
                                </div>
                                <div class="match-score">${score}</div>
                            </div>`;
                    });

                    matchesHTML += `</div>`;
                    card.insertAdjacentHTML('beforeend', matchesHTML);
                    slide.appendChild(card);
                });

                viewport.appendChild(slide);
            });

            // Slider starten
            currentSlide = 0;
            startSlider();
        }

        // 5. START & AKTUALISIERUNGS-SCHLEIFE (Exakt alle 10 Minuten)
        updateData();
        setInterval(updateData, 600000); // 10 Minuten = 600.000 ms
    </script>
</body>
