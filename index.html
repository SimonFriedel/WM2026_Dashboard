<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM 2026 – Live Kiosk Gruppenphase</title>
    <style>
        /* === MODERNES, ULTRA-LESBARES KIOSK DESIGN === */
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --grid-border: #334155;
            --text-white: #f8fafc;
            --text-gray: #94a3b8;
            --cyan: #06b6d4;
            --green: #10b981;
            --green-badge: rgba(16, 185, 129, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* === TOP HEADER === */
        header {
            background-color: #020617;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--grid-border);
        }

        .header-title h1 { font-size: 26px; font-weight: 900; letter-spacing: 0.5px; }
        .header-title span { font-size: 12px; color: var(--cyan); font-weight: bold; text-transform: uppercase; }

        .header-meta { display: flex; align-items: center; gap: 20px; }
        #sync-status { font-size: 11px; font-weight: bold; padding: 6px 12px; border-radius: 4px; background: #334155; color: #fff; }
        #clock { font-size: 24px; font-weight: bold; font-family: monospace; color: var(--cyan); }

        /* === TIMING PROGRESS BAR === */
        #progress-container { width: 100%; height: 4px; background: #020617; }
        #progress-bar { height: 100%; width: 0%; background: var(--cyan); transition: width linear; }

        /* === SLIDES VIEWPORT === */
        main { flex: 1; position: relative; padding: 15px; }

        .slide {
            position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            opacity: 0; visibility: hidden; transition: opacity 0.5s ease-in-out;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Spalten */
            grid-template-rows: repeat(2, 1fr);    /* 2 Zeilen = Max 8 Boxen pro Seite */
            gap: 15px;
        }
        .slide.active { opacity: 1; visibility: visible; }

        /* === GRUPPEN BOXEN === */
        .group-box {
            background-color: var(--bg-card);
            border: 1px solid var(--grid-border);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .group-box h2 {
            font-size: 15px; text-transform: uppercase; color: var(--cyan);
            border-bottom: 2px solid var(--grid-border); padding-bottom: 5px; margin-bottom: 8px;
            font-weight: 800;
        }

        /* === TABELLEN === */
        .kiosk-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
        .kiosk-table th { text-align: left; color: var(--text-gray); padding: 4px; font-weight: 600; border-bottom: 1px solid var(--grid-border); }
        .kiosk-table td { padding: 5px 4px; border-bottom: 1px solid #334155; }
        .kiosk-table tr:nth-child(1) td, .kiosk-table tr:nth-child(2) td { 
            background: var(--green-badge); color: #34d399; font-weight: bold; 
        }

        /* === SPIELE-LISTE === */
        .group-matches { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; justify-content: flex-end; }
        .match-card { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 4px 6px; background: #0f172a; border-radius: 4px; font-size: 10px;
            border-left: 3px solid var(--grid-border);
        }
        .match-card.live { border-left-color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
        .m-meta { color: var(--text-gray); font-size: 9px; }
        .m-teams { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .m-score { font-family: monospace; font-weight: bold; color: var(--cyan); padding-left: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>WORLD CUP 2026 — LIVE MONITOR</h1>
            <span>Automatischer Kiosk-Modus • 10 Min. OpenLigaDB-Sync</span>
        </div>
        <div class="header-meta">
            <div id="sync-status">INITIALISIERUNG...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <main id="kiosk-viewport">
        </main>

    <script>
        // ==========================================
        // 1. UHRZEIT-STEUERUNG
        // ==========================================
        function runClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
        }
        runClock();
        setInterval(runClock, 1000);

        // ==========================================
        // 2. ROTATIONS-STEUERUNG
        // ==========================================
        let slideIndex = 0;
        let slideTimer;
        const switchInterval = 15000; 

        function startKioskRotation() {
            clearInterval(slideTimer);
            const slides = document.querySelectorAll('.slide');
            const bar = document.getElementById('progress-bar');
            
            if (slides.length <= 1) {
                bar.style.width = "100%";
                return;
            }

            function animateProgressBar() {
                bar.style.transition = 'none'; bar.style.width = '0%';
                setTimeout(() => {
                    bar.style.transition = `width ${switchInterval}ms linear`;
                    bar.style.width = '100%';
                }, 50);
            }

            function nextSlide() {
                if(slides[slideIndex]) slides[slideIndex].classList.remove('active');
                slideIndex = (slideIndex + 1) % slides.length;
                if(slides[slideIndex]) slides[slideIndex].classList.add('active');
                animateProgressBar();
            }

            animateProgressBar();
            slideTimer = setInterval(nextSlide, switchInterval);
        }

        // ==========================================
        // 3. DATEN-ABRUF & STRUKTURIERUNG
        // ==========================================
        async function loadKioskData() {
            const statusBadge = document.getElementById('sync-status');
            statusBadge.innerText = "LADE DATEN...";
            statusBadge.style.backgroundColor = "#64748b";

            let groupMap = {};
            const letters = ["A","B","C","D","E","F","G","H","I","J","K","L"];
            letters.forEach(l => {
                groupMap[`Gruppe ${l}`] = { teams: {}, matches: [] };
            });

            try {
                const response = await fetch('https://api.openligadb.de/getmatchdata/wm2026');
                if (!response.ok) throw new Error("API-Verbindungsfehler");
                const matches = await response.json();

                if (matches && matches.length > 0) {
                    matches.forEach(m => {
                        let gName = m.group?.groupName;
                        if (!gName || !groupMap[gName]) return; 

                        groupMap[gName].matches.push(m);

                        let t1 = m.team1.teamName;
                        let t2 = m.team2.teamName;

                        if (!groupMap[gName].teams[t1]) groupMap[gName].teams[t1] = { name: t1, sp: 0, gf: 0, ga: 0, pkt: 0 };
                        if (!groupMap[gName].teams[t2]) groupMap[gName].teams[t2] = { name: t2, sp: 0, gf: 0, ga: 0, pkt: 0 };

                        if (m.matchIsFinished && m.matchResults && m.matchResults.length > 0) {
                            let res = m.matchResults.find(r => r.resultTypeID === 2) || m.matchResults[0];
                            let s1 = res.pointsTeam1;
                            let s2 = res.pointsTeam2;

                            groupMap[gName].teams[t1].sp++; groupMap[gName].teams[t2].sp++;
                            groupMap[gName].teams[t1].gf += s1; groupMap[gName].teams[t1].ga += s2;
                            groupMap[gName].teams[t2].gf += s2; groupMap[gName].teams[t2].ga += s1;

                            if (s1 > s2) groupMap[gName].teams[t1].pkt += 3;
                            else if (s2 > s1) groupMap[gName].teams[t2].pkt += 3;
                            else { groupMap[gName].teams[t1].pkt += 1; groupMap[gName].teams[t2].pkt += 1; }
                        }
                    });
                    statusBadge.innerText = "SYNC: OPENLIGADB LIVE";
                    statusBadge.style.backgroundColor = "#10b981";
                } else {
                    throw new Error("API lieferte leere Daten.");
                }

            } catch (e) {
                console.warn("API Switch auf lokale Live-Simulation.", e);
                statusBadge.innerText = "MONITOR: SIMULATION AKTIV";
                statusBadge.style.backgroundColor = "#0284c7";
                groupMap = generateSimulationData();
            }

            renderKioskUI(groupMap);
        }

        // ==========================================
        // 4. RENDERING (Max. 8 Gruppen pro Seite)
        // ==========================================
        function renderKioskUI(groupMap) {
            const viewport = document.getElementById('kiosk-viewport');
            viewport.innerHTML = "";

            const sortedGroups = Object.keys(groupMap).sort();
            
            let pageSlices = [];
            for (let i = 0; i < sortedGroups.length; i += 8) {
                pageSlices.push(sortedGroups.slice(i, i + 8));
            }

            pageSlices.forEach((pageGroups, pageIdx) => {
                const slide = document.createElement('div');
                slide.className = `slide ${pageIdx === 0 ? 'active' : ''}`;
                slide.id = `page-${pageIdx}`;

                pageGroups.forEach(gName => {
                    const box = document.createElement('div');
                    box.className = "group-box";
                    box.innerHTML = `<h2>${gName}</h2>`;

                    let tableRows = "";
                    let sortedTeams = Object.values(groupMap[gName].teams).sort((a,b) => {
                        return b.pkt - a.pkt || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf || a.name.localeCompare(b.name);
                    });

                    if(sortedTeams.length === 0) {
                        sortedTeams = [{name:"TBD",sp:0,gf:0,ga:0,pkt:0},{name:"TBD",sp:0,gf:0,ga:0,pkt:0},{name:"TBD",sp:0,gf:0,ga:0,pkt:0},{name:"TBD",sp:0,gf:0,ga:0,pkt:0}];
                    }

                    sortedTeams.forEach((t, idx) => {
                        tableRows += `<tr>
                            <td>${idx + 1}. ${t.name}</td>
                            <td style="text-align:center">${t.sp}</td>
                            <td style="text-align:center">${t.gf}:${t.ga}</td>
                            <td style="text-align:center; font-weight:bold">${t.pkt}</td>
                        </tr>`;
                    });

                    box.insertAdjacentHTML('beforeend', `
                        <table class="kiosk-table">
                            <thead><tr><th>Team</th><th style="text-align:center">Sp</th><th style="text-align:center">Tore</th><th style="text-align:center">Pkt</th></tr></thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                    `);

                    let matchesHTML = `<div class="group-matches">`;
                    let sortedMatches = groupMap[gName].matches.sort((a,b) => new Date(a.matchDateTime) - new Date(b.matchDateTime));

                    if(sortedMatches.length === 0) {
                        matchesHTML += `<div style="font-size:11px;color:#94a3b8;text-align:center;padding:10px;">Warte auf Spielplan...</div>`;
                    } else {
                        sortedMatches.forEach(m => {
                            let d = new Date(m.matchDateTime);
                            let dStr = d.toLocaleDateString('de-DE', {day: '2-digit', month: '2-digit'}) + " " + d.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                            
                            let score = "- : -";
                            if(m.matchIsFinished && m.matchResults.length > 0) {
                                let r = m.matchResults.find(res => res.resultTypeID === 2) || m.matchResults[0];
                                score = `${r.pointsTeam1} : ${r.pointsTeam2}`;
                            }

                            let isLive = !m.matchIsFinished && new Date() >= d;

                            matchesHTML += `
                                <div class="match-card ${isLive ? 'live' : ''}">
                                    <div>
                                        <div class="m-meta">${dStr} • ${m.location?.locationCity || 'Stadion'}</div>
                                        <div class="m-teams">${m.team1.shortName || m.team1.teamName} - ${m.team2.shortName || m.team2.teamName}</div>
                                    </div>
                                    <div class="m-score">${score}</div>
                                </div>`;
                        });
                    }

                    matchesHTML += `</div>`;
                    box.insertAdjacentHTML('beforeend', matchesHTML);
                    slide.appendChild(box);
                });

                viewport.appendChild(slide);
            });

            slideIndex = 0;
            startKioskRotation();
        }

        // ==========================================
        // 5. BACKUP DATEN-GENERATOR (WM 2026 Auslosung)
        // ==========================================
        function generateSimulationData() {
            let mock = {};
            const letters = ["A","B","C","D","E","F","G","H","I","J","K","L"];
            const staedte = ["Dallas", "Houston", "Los Angeles", "Miami", "New York", "Atlanta"];
            
            const standardTeams = {
                A: ["Mexiko", "USA", "Kanada", "Ghana"],
                B: ["Spanien", "Kamerun", "Schottland", "Neuseeland"],
                C: ["Argentinien", "Schweden", "Serbien", "Saudi-Arabien"],
                D: ["Frankreich", "Nigeria", "Kolumbien", "Oman"],
                E: ["Deutschland", "Ecuador", "Elfenbeinküste", "Curaçao"],
                F: ["Belgien", "Marokko", "Algerien", "Australien"],
                G: ["Portugal", "Chile", "Polen", "Ägypten"],
                H: ["Italien", "Japan", "Panama", "Südkorea"],
                I: ["Niederlande", "Uruguay", "Türkei", "Irak"],
                J: ["Kroatien", "Dänemark", "Peru", "Iran"],
                K: ["England", "Tunesien", "Jamaika", "Katar"],
                L: ["Brasilien", "Österreich", "Mali", "China"]
            };

            letters.forEach(l => {
                mock[`Gruppe ${l}`] = { teams: {}, matches: [] };
                let tNames = standardTeams[l];

                tNames.forEach((t, idx) => {
                    mock[`Gruppe ${l}`].teams[t] = { name: t, sp: 1, gf: idx === 0 ? 2 : 1, ga: idx === 0 ? 1 : 2, pkt: idx === 0 ? 3 : 0 };
                });

                mock[`Gruppe ${l}`].matches.push({
                    matchDateTime: "2026-06-15T18:00:00",
                    matchIsFinished: true,
                    location: { locationCity: staedte[Math.floor(Math.random()*staedte.length)] },
                    team1: { teamName: tNames[0], shortName: tNames[0].substring(0,6) },
                    team2: { teamName: tNames[3], shortName: tNames[3].substring(0,6) },
                    matchResults: [{ resultTypeID: 2, pointsTeam1: 2, pointsTeam2: 1 }]
                });

                mock[`Gruppe ${l}`].matches.push({
                    matchDateTime: "2026-06-20T21:00:00",
                    matchIsFinished: false,
                    location: { locationCity: staedte[Math.floor(Math.random()*staedte.length)] },
                    team1: { teamName: tNames[1], shortName: tNames[1].substring(0,6) },
                    team2: { teamName: tNames[2], shortName: tNames[2].substring(0,6) },
                    matchResults: []
                });
            });
            return mock;
        }

        // ==========================================
        // 6. INITIALER ANSTOSS & AUTOMATISCHER REFRESH
        // ==========================================
        loadKioskData();
        setInterval(loadKioskData, 600000); // 10 Minuten Taktung
    </script>
</body>
</html>
